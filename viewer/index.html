<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dziedzictwo - Oś Czasu Wydarzeń</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>
    
    <div class="container">
        <header class="fade-in">
            <h1>Dziedzictwo</h1>
            <p class="subtitle">Zrekonstruowana historia najważniejszych wydarzeń</p>
            <div class="divider"></div>
        </header>

        <main id="timeline-container">
            <!-- Content will be dynamically generated here by script.js -->
        </main>

        <aside id="episode-timeline">
            <!-- Episode markers will be generated by script.js -->
        </aside>
        
        <footer class="fade-in delays-1">
            <p>Stworzone na podstawie streszczeń odcinków.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
